<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 창작물 인식 설문조사</title>
<style>
:root{--accent:#673ab7;--line:#dadce0;--muted:#5f6368;--danger:#b3261e}*{box-sizing:border-box}body{margin:0;background:#f7f7f8;color:#202124;font:16px/1.55 system-ui,-apple-system,"Noto Sans KR",sans-serif}.progress{position:fixed;z-index:10;top:0;left:0;width:100%;height:7px;background:#e5e5e5}.progress i{display:block;height:100%;width:0;background:var(--accent);transition:width .2s}.wrap{width:min(760px,calc(100% - 24px));margin:35px auto 60px}.card{background:#fff;border:1px solid var(--line);border-top:7px solid var(--accent);border-radius:9px;padding:clamp(22px,5vw,40px);box-shadow:0 1px 2px #00000012}h1{font-size:clamp(22px,5vw,30px);line-height:1.3;margin:0 0 20px}h2{font-size:22px;margin:0 0 18px}.notice{white-space:pre-line}.q{border:1px solid #e3e3e3;border-radius:8px;padding:18px;margin:18px 0}.q legend,.q>label:first-child{display:block;font-weight:650;margin-bottom:10px}.required{color:var(--danger)}.choices{display:grid;gap:7px}.choice{display:flex;align-items:center;gap:10px;min-height:44px;padding:8px 10px;border-radius:5px;cursor:pointer}.choice:hover{background:#f4f0fa}.choice input{width:20px;height:20px;accent-color:var(--accent)}.likert{grid-template-columns:repeat(5,1fr);text-align:center}.likert .choice{min-width:0;flex-direction:column;justify-content:center;font-size:13px;padding:6px 2px}.likertHelp{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-top:6px}select,textarea,input[type=text]{width:100%;font:inherit;border:1px solid #9aa0a6;border-radius:5px;padding:12px;background:#fff}textarea{min-height:130px;resize:vertical}.actions{display:flex;gap:10px;justify-content:space-between;margin-top:24px}.actions.end{justify-content:flex-end}button{min-height:46px;border:0;border-radius:5px;padding:10px 22px;font:650 16px inherit;cursor:pointer;background:var(--accent);color:#fff}button.secondary{background:#fff;color:var(--accent);border:1px solid var(--accent)}button:disabled{background:#c8c8c8;color:#fff;cursor:not-allowed}.hint{min-height:24px;color:var(--danger);font-size:14px;margin-top:8px}.stimulus{text-align:center;margin:10px 0 25px}.stimulus img,.stimulus video{display:block;max-width:100%;width:auto;height:auto;margin:auto;border-radius:4px;background:#eee}.stimulus.face img{max-height:480px}.mediaError{padding:45px 12px;background:#f1f1f1;color:var(--danger)}.label{font-size:20px;font-weight:700;margin:0 0 12px}.spinner{display:inline-block;width:20px;height:20px;border:3px solid #ddd;border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}.hidden{display:none!important}@media(max-width:520px){.wrap{width:calc(100% - 16px)}.card{padding:20px 15px}.likert .choice{font-size:12px}.q{padding:14px 10px}}
</style></head><body><div class="progress"><i id="bar"></i></div><main class="wrap"><section class="card" id="app" aria-live="polite"></section></main>
<script>
/* ======================== 나중에 이 CONFIG만 수정하세요 ======================== */
const CONFIG={
  WEB_APP_URL:'https://script.google.com/macros/s/AKfycbzZtvKWpvgsVLGyT4UnriOCZjO_aA-ygDeV4flstV8WM4qLllswoAQnSpeNnIOIpVGy/exec',
  ADMIN_CODE:'UVI-2026-k7Q9-mP4x', // survey에서는 사용하지 않으며 두 파일 설정 통일용
  stimuli:{
    face_real:{url:'face_real.jpg',label:'얼굴 1',domain:'face',identity:'실제 사진',isAI:false,condition:'기준'},
    face_ai_high:{url:'face_ai_high.jpg',label:'얼굴 2',domain:'face',identity:'AI 고품질',isAI:true,condition:'AI 고품질'},
    face_ai_low:{url:'face_ai_low.jpg',label:'얼굴 3',domain:'face',identity:'AI 저품질',isAI:true,condition:'AI 저품질'},
    animal_real:{url:'animal_real.jpg',label:'이미지 1',domain:'animal',identity:'실제 사진',isAI:false,condition:'기준'},
    animal_ai:{url:'animal_ai.jpg',label:'이미지 2',domain:'animal',identity:'AI 생성',isAI:true,condition:'AI'},
    ui_C_baseline:{url:'ui_C_baseline.png',label:'UI-C',domain:'ui',identity:'직접 제작',isAI:false,condition:'기준'},
    ui_A_ai_high:{url:'ui_A_ai_high.png',label:'UI-A',domain:'ui',identity:'AI 고사양',isAI:true,condition:'AI 고사양'},
    ui_B_ai_low:{url:'ui_B_ai_low.png',label:'UI-B',domain:'ui',identity:'AI 저사양',isAI:true,condition:'AI 저사양'},
    video_real:{url:'video_real.mp4',label:'영상 1',domain:'video',identity:'실제 촬영',isAI:false,condition:'기준'},
    video_ai:{url:'video_ai.mp4',label:'영상 2',domain:'video',identity:'AI 생성',isAI:true,condition:'AI'}
  }
};
const DOMAINS={
 face:{name:'사람 얼굴',intro:'지금부터 세 개의 얼굴 이미지를 하나씩 보게 됩니다. 각 이미지를 충분히 본 뒤 문항에 답해 주세요.',subject:'얼굴',standard:'사람',parts:'피부, 눈, 머리카락'},
 animal:{name:'동물 이미지',intro:'지금부터 두 개의 동물 이미지를 하나씩 보게 됩니다. 각 이미지를 충분히 본 뒤 문항에 답해 주세요.',subject:'동물 이미지',standard:'동물',parts:'털, 눈, 배경'},
 ui:{name:'앱 화면',intro:'지금부터 세 개의 앱 화면을 하나씩 보게 됩니다. 각 화면을 충분히 본 뒤 문항에 답해 주세요.',subject:'화면',standard:'사람이 만든 앱 화면',parts:'아바타, 아이콘, 글씨'},
 video:{name:'영상',intro:'지금부터 두 개의 짧은 영상을 하나씩 보게 됩니다. 각 영상을 충분히 본 뒤 문항에 답해 주세요.',subject:'영상',standard:'촬영된 장면',parts:'인물, 배경, 움직임'}
};
const LATIN=[['face','animal','ui','video'],['animal','ui','video','face'],['ui','video','face','animal'],['video','face','animal','ui']];
const app=document.getElementById('app'),bar=document.getElementById('bar');
const started=Date.now(),data={responseId:new Date().toISOString().replace(/\D/g,'').slice(0,17)+'-'+Math.random().toString(36).slice(2,9),ratings:{},responseTimes:{},background:{},finish:{},global:{}};
let pages=[],page=0,shownAt=Date.now(),domainOrder=[],stimOrders={};
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>[...r.querySelectorAll(s)];
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const shuffle=a=>{a=[...a];for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
const device=()=>/ipad|tablet/i.test(navigator.userAgent)?'태블릿':/mobile|android|iphone/i.test(navigator.userAgent)?'스마트폰':'PC';
function setProgress(){bar.style.width=(page/Math.max(1,pages.length-1)*100)+'%'}
function likert(name){return `<div class="choices likert">${[1,2,3,4,5].map(n=>`<label class="choice"><input required type="radio" name="${name}" value="${n}"><span>${n}</span></label>`).join('')}</div><div class="likertHelp"><span>전혀 아니다</span><span>매우 그렇다</span></div>`}
function buttons(back=true,label='다음'){return `<div class="hint" id="hint"></div><div class="actions ${back?'':'end'}">${back?'<button class="secondary" id="back">이전</button>':''}<button id="next">${label}</button></div>`}
function wireNext(onNext,onBack){const next=$('#next');const invalid=()=>$$('[required]').find(x=>x.type==='radio'||x.type==='checkbox'?!$(`[name="${CSS.escape(x.name)}"]:checked`):!x.value.trim()||(x.minLength>0&&x.value.trim().length<x.minLength));const update=()=>{if(next)next.disabled=!!invalid();const h=$('#hint');if(h)h.textContent=invalid()?'필수 문항에 모두 응답하면 다음으로 이동할 수 있습니다.':''};$$('input,select,textarea').forEach(x=>{x.addEventListener('input',update);x.addEventListener('change',update)});update();if(next)next.onclick=()=>{const bad=invalid();if(bad){bad.focus();return}onNext()};const back=$('#back');if(back)back.onclick=onBack||(()=>{page--;render()});}
function saveForm(target){$$('input:checked,select,textarea,input[type=text]').forEach(el=>{if(!el.name)return;if(el.type==='checkbox'){target[el.name]=target[el.name]||[];if(!target[el.name].includes(el.value))target[el.name].push(el.value)}else target[el.name]=el.value})}
async function chooseOrder(){const forced=Number(new URLSearchParams(location.search).get('order'));let idx=(forced>=1&&forced<=4)?forced-1:null;if(idx===null&&CONFIG.WEB_APP_URL.startsWith('http'))try{const r=await fetch(CONFIG.WEB_APP_URL+'?action=count');const j=await r.json();if(j.ok)idx=Number(j.count)%4}catch(e){}if(idx===null)idx=Math.floor(Math.random()*4);data.orderCode=idx+1;domainOrder=LATIN[idx];domainOrder.forEach(d=>stimOrders[d]=shuffle(Object.keys(CONFIG.stimuli).filter(k=>CONFIG.stimuli[k].domain===d)));data.stimulusOrders=Object.fromEntries(Object.entries(stimOrders).map(([k,v])=>[k,v.join('|')]));buildPages()}
function buildPages(){pages=[{type:'consent'},{type:'background'}];domainOrder.forEach(d=>{pages.push({type:'intro',d});stimOrders[d].forEach(k=>pages.push({type:'stim',d,k}));pages.push({type:'finish',d})});pages.push({type:'global'},{type:'submit'});render()}
function render(){setProgress();shownAt=Date.now();const p=pages[page];if(!p)return;if(p.type==='consent')return consent();if(p.type==='background')return background();if(p.type==='intro')return intro(p);if(p.type==='stim')return stimulus(p);if(p.type==='finish')return finish(p);if(p.type==='global')return globalPage();if(p.type==='submit')return submitPage()}
function consent(){app.innerHTML=`<h1>AI 창작물에 불쾌한 골짜기를 느끼는 요인에 대한 설문조사</h1><p class="notice">본 조사는 고등학생이 AI로 생성한 이미지·영상·화면과 사람이 만들거나 촬영한 것을 어떻게 인식하는지 알아보기 위한 학교 과제 연구입니다. 이름, 학번, 연락처 등 개인 식별 정보는 수집하지 않습니다. 일부 이미지가 어색하거나 불편하게 느껴질 수 있으며, 참여는 전적으로 자율적이고 언제든 중단할 수 있습니다. 참여 여부는 성적·평가와 무관합니다. 소요 시간은 약 10~13분입니다.</p><div class="actions"><button class="secondary" id="no">동의하지 않습니다</button><button id="yes">동의합니다</button></div>`;$('#no').onclick=()=>{bar.style.width='100%';app.innerHTML='<h1>설문 종료</h1><p>참여해 주셔서 감사합니다. 설문이 종료되었습니다.</p>'};$('#yes').onclick=()=>{data.consented=true;page++;render()}}
function background(){app.innerHTML=`<h2>배경 문항</h2><p>다음 문항에 응답해 주세요.</p><div class="q"><label>1. 학년 <span class="required">*</span></label><select required name="grade"><option value="">선택</option><option>1학년</option><option>2학년</option><option>3학년</option></select></div><div class="q"><label>2. 지금 사용 중인 기기 <span class="required">*</span></label><select required name="deviceReported">${['스마트폰','태블릿','PC'].map(x=>`<option ${x===device()?'selected':''}>${x}</option>`)}</select></div><div class="q"><label>3. ChatGPT, 이미지 생성 AI 같은 도구를 얼마나 자주 사용하나요? <span class="required">*</span></label>${likert('aiFrequency')}<div class="likertHelp"><span>전혀 사용하지 않는다</span><span>거의 매일 사용한다</span></div></div><div class="q"><label>4. '불쾌한 골짜기'라는 말을 이번 조사 전에 이미 알고 있었다. <span class="required">*</span></label>${likert('priorKnowledge')}</div>${buttons(false)}`;wireNext(()=>{saveForm(data.background);data.deviceDetected=device();page++;render()})}
function intro(p){app.innerHTML=`<h2>${esc(DOMAINS[p.d].name)}</h2><p>${esc(DOMAINS[p.d].intro)}</p>${buttons()}`;wireNext(()=>{page++;render()})}
function media(k){const s=CONFIG.stimuli[k],err=`this.outerHTML='<div class=&quot;mediaError&quot;>자극을 불러오지 못했습니다. 새로고침해 주세요.</div>'`;return s.domain==='video'?`<video src="${esc(s.url)}" muted playsinline loop autoplay onerror="${err}"></video>`:`<img src="${esc(s.url)}" alt="${esc(s.label)}" onerror="${err}">`}
function stimulus(p){const d=DOMAINS[p.d],s=CONFIG.stimuli[p.k];const qs=[`이 ${d.subject}은(는) 실제 ${d.standard}처럼 사실적으로 보인다.`,`이 ${d.subject}의 요소들(${d.parts})의 사실적인 정도가 서로 잘 맞는다.`,`전체적으로 자연스럽다.`,`어색하고 불편하게 느껴진다.`,`섬뜩하거나 기괴하게 느껴진다.`];app.innerHTML=`<div class="label">${esc(s.label)}</div><div class="stimulus ${p.d}">${media(p.k)}</div>${qs.map((q,i)=>`<fieldset class="q"><legend>R${i+1}. ${esc(q)} <span class="required">*</span></legend>${likert('R'+(i+1))}</fieldset>`).join('')}${buttons()}`;wireNext(()=>{$$('input:checked').forEach(x=>data.ratings[p.k+'_'+x.name]=Number(x.value));data.responseTimes[p.k]=Math.round((Date.now()-shownAt)/1000);page++;render()})}
function finish(p){let html='';if(p.d==='face')html=`<div class="q"><label>방금 본 세 얼굴 중 AI가 만들었다고 생각되는 것을 모두 고르세요. <span class="required">*</span></label><div class="choices">${['얼굴 1','얼굴 2','얼굴 3','없다고 생각한다'].map(x=>`<label class="choice"><input required type="checkbox" name="faceDetection" value="${x}">${x}</label>`).join('')}</div></div>`;if(p.d==='animal')html=single('animalDetection','두 이미지 중 AI가 만들었다고 생각되는 것을 고르세요.',['이미지 1','이미지 2','모르겠다']);if(p.d==='ui')html=single('uiUse','세 UI 중 가장 사용해 보고 싶은 UI는 무엇인가요?',['UI-A','UI-B','UI-C'])+single('uiTrust','세 UI 중 가장 신뢰가 가는 UI는 무엇인가요?',['UI-A','UI-B','UI-C']);if(p.d==='video')html=single('videoNatural','두 영상 중 더 자연스럽게 느껴진 것을 고르세요.',['영상 1','영상 2','비슷하다']);app.innerHTML=`<h2>${esc(DOMAINS[p.d].name)} 마무리</h2>${html}${buttons()}`;if(p.d==='face')$$('[name=faceDetection]').forEach(x=>x.onchange=()=>{if(x.value==='없다고 생각한다'&&x.checked)$$('[name=faceDetection]').filter(y=>y!==x).forEach(y=>y.checked=false);else if(x.checked){const n=$('[name=faceDetection][value="없다고 생각한다"]');if(n)n.checked=false}});wireNext(()=>{data.finish[p.d]={};saveForm(data.finish[p.d]);page++;render()})}
function single(name,q,opts){return `<fieldset class="q"><legend>${q} <span class="required">*</span></legend><div class="choices">${opts.map(x=>`<label class="choice"><input required type="radio" name="${name}" value="${x}">${x}</label>`).join('')}</div></fieldset>`}
function globalPage(){app.innerHTML=`<h2>종합 문항</h2>${single('G1','1. 오늘 본 것들 중 가장 큰 이질감(어색함·불편함·섬뜩함)을 느낀 종류는 무엇인가요?',['사람 얼굴','동물 이미지','앱 화면','영상'])}${single('G2','2. 그렇게 느낀 가장 큰 이유는 무엇인가요?',['실제와 미묘하게 달라서','요소들이 서로 안 어울려서','움직임·표정이 부자연스러워서','AI가 만든 것 같아서','기타'])}<div class="q hidden" id="otherWrap"><label>기타 이유 <span class="required">*</span></label><input type="text" name="G2Other"></div><div class="q"><label>3. 가장 이질감이 컸던 자극 하나를 떠올리고, 왜 그렇게 느꼈는지 자유롭게 적어 주세요. (최소 10자) <span class="required">*</span></label><textarea required minlength="10" name="G3"></textarea></div><div class="q"><label>4. 같은 종류 안의 자극들이 서로 같은 내용을 담고 있다는 점이 분명했다. <span class="required">*</span></label>${likert('contentCheck')}</div>${buttons()}`;$$('[name=G2]').forEach(x=>x.onchange=()=>{const w=$('#otherWrap'),input=$('[name=G2Other]');w.classList.toggle('hidden',x.value!=='기타');input.required=x.value==='기타'});wireNext(()=>{const t=$('[name=G3]');if(t.value.trim().length<10){$('#hint').textContent='서술형 응답을 10자 이상 적어 주세요.';return}saveForm(data.global);page++;render()})}
function submitPage(){if(localStorage.getItem('uviSurveySubmitted')){app.innerHTML='<h1>이미 제출한 설문입니다</h1><p>같은 브라우저에서는 중복 제출할 수 없습니다.</p>';return}app.innerHTML=`<h2>응답 제출</h2><p>응답을 확인했습니다. 아래 버튼을 누르면 익명 응답이 저장됩니다.</p>${buttons(true,'제출하기')}`;wireNext(submit,()=>{page--;render()})}
async function post(payload){const r=await fetch(CONFIG.WEB_APP_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});const j=await r.json();if(!j.ok)throw Error(j.error||'저장 실패');return j}
async function submit(){if(!CONFIG.WEB_APP_URL.startsWith('http')){showSubmitError('CONFIG.WEB_APP_URL을 먼저 설정해 주세요.');return}data.submittedAt=new Date().toISOString();data.durationSeconds=Math.round((Date.now()-started)/1000);app.innerHTML='<h2><span class="spinner"></span>응답을 저장하고 있습니다</h2><p>창을 닫지 말아 주세요.</p>';let err;for(let i=0;i<3;i++){try{if(i)await new Promise(r=>setTimeout(r,3000));await post(data);localStorage.setItem('uviSurveySubmitted',data.responseId);localStorage.removeItem('uviSurveyPending');debrief();return}catch(e){err=e}}localStorage.setItem('uviSurveyPending',JSON.stringify(data));showSubmitError('지금은 서버에 연결할 수 없어 이 기기에 안전하게 보관했습니다. 다음 접속 때 자동으로 다시 전송합니다. ('+err.message+')')}
function showSubmitError(msg){app.innerHTML=`<h2>응답 임시 보관</h2><p>${esc(msg)}</p>`}
function debrief(){bar.style.width='100%';const ai=Object.values(CONFIG.stimuli).filter(s=>s.isAI).map(s=>s.label);const non=Object.values(CONFIG.stimuli).filter(s=>!s.isAI).map(s=>s.label);app.innerHTML=`<h1>참여해 주셔서 감사합니다</h1><p>안내: ${esc(ai.join('·'))}는 AI가 생성한 것이고, ${esc(non.join('·'))}는 실제 사진·촬영 또는 직접 제작한 것이었습니다. 응답이 저장되었습니다.</p>`}
(async()=>{const pending=localStorage.getItem('uviSurveyPending');if(pending&&CONFIG.WEB_APP_URL.startsWith('http'))try{await post(JSON.parse(pending));localStorage.removeItem('uviSurveyPending');localStorage.setItem('uviSurveySubmitted','recovered')}catch(e){}await chooseOrder()})();
// 관리자용 중복 제출 초기화: 개발자 도구에서
// localStorage.removeItem('uviSurveySubmitted'); localStorage.removeItem('uviSurveyPending');
</script></body></html>
