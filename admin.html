<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>설문 관리자 대시보드</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>*{box-sizing:border-box}body{margin:0;background:#f6f7f9;color:#202124;font:15px/1.5 system-ui,-apple-system,"Noto Sans KR",sans-serif}header{background:#fff;border-bottom:1px solid #ddd;padding:16px 24px;position:sticky;top:0;z-index:5}header h1{font-size:21px;margin:0}.container{max-width:1450px;margin:20px auto;padding:0 16px}.panel{background:#fff;border:1px solid #ddd;border-radius:8px;padding:20px;margin:16px 0}.login{max-width:450px;margin:12vh auto}.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:end}.controls label{display:grid;gap:4px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:18px}.card b{display:block;font-size:27px;color:#4b2a8a}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.chart{height:370px;position:relative}.wide{grid-column:1/-1}button{min-height:44px;background:#673ab7;color:#fff;border:0;border-radius:5px;padding:9px 17px;font:600 15px inherit;cursor:pointer}button.secondary{background:#fff;color:#673ab7;border:1px solid #673ab7}input{min-height:42px;border:1px solid #999;border-radius:5px;padding:8px;font:inherit}table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #ddd;padding:7px;text-align:right}th{background:#f3f0f8}th:first-child,td:first-child{text-align:left}.scroll{overflow:auto;max-height:520px}.heat td{text-align:center}.responses tr{cursor:pointer}.responses tr:hover{background:#f5f1fb}.muted{color:#666}.error{color:#b3261e}.pill{padding:2px 7px;border-radius:12px;background:#eee}.modal{position:fixed;inset:0;background:#0008;display:grid;place-items:center;z-index:20;padding:16px}.modal>div{background:#fff;max-width:900px;width:100%;max-height:90vh;overflow:auto;border-radius:8px;padding:22px}.hidden{display:none!important}@media(max-width:850px){.cards,.grid{grid-template-columns:1fr 1fr}}@media(max-width:600px){.cards,.grid{grid-template-columns:1fr}.wide{grid-column:auto}.chart{height:320px}header{position:static}}
</style></head><body><header><h1>AI 창작물 인식 설문 — 관리자</h1></header><main class="container"><section id="login" class="panel login"><h2>관리자 접속</h2><label>접속 코드 <input id="code" type="password" autocomplete="current-password"></label><p class="error" id="loginError"></p><button id="loginBtn">대시보드 열기</button></section><div id="dash" class="hidden"><section class="panel controls"><button id="refresh">수동 새로고침</button><button class="secondary" id="csv">원자료 CSV</button><label><span><input id="excludeFast" type="checkbox"> 품질 플래그 제외</span></label><label>제외할 응답 ID (쉼표 구분)<input id="excludeIds" placeholder="ID1, ID2"></label><span id="status" class="muted"></span></section><section class="cards" id="cards"></section><section class="grid"><section class="panel"><h2>H1. 도메인×조건 UVI 평균 (95% CI)</h2><div class="chart"><canvas id="h1"></canvas></div></section><section class="panel"><h2>H2. 도메인별 ΔUVI</h2><div class="chart"><canvas id="delta"></canvas></div></section><section class="panel wide"><h2>H2. 참가자 개인별 대응선</h2><div class="chart"><canvas id="paired"></canvas></div></section><section class="panel"><h2>H3. AI 탐지 여부별 UVI</h2><div class="chart"><canvas id="detect"></canvas></div></section><section class="panel"><h2>H4. AI 사용 빈도와 AI UVI</h2><div class="chart"><canvas id="exposure"></canvas></div></section><section class="panel"><h2>H5. UI 선택 비율</h2><div class="chart"><canvas id="uiChoice"></canvas></div></section><section class="panel"><h2>H5. UI UVI와 선택률</h2><div class="chart"><canvas id="uiUvi"></canvas></div></section><section class="panel"><h2>도메인별 AI 탐지 정답률</h2><div class="chart"><canvas id="accuracy"></canvas></div></section><section class="panel"><h2>G1 선택 분포</h2><div class="chart"><canvas id="g1"></canvas></div></section><section class="panel"><h2>G2 선택 분포</h2><div class="chart"><canvas id="g2"></canvas></div></section><section class="panel wide"><h2>자극×문항 평균 히트맵</h2><div class="scroll" id="heat"></div></section></section><section class="panel"><h2>조건별 기술통계</h2><div class="scroll" id="desc"></div></section><section class="panel"><h2>신뢰도와 추론통계</h2><div class="scroll" id="tests"></div></section><section class="panel"><h2>G3 서술형 응답</h2><div class="scroll" id="texts"></div></section><section class="panel"><h2>응답 목록 (행 클릭: 상세 보기)</h2><div class="scroll" id="rows"></div></section></div></main><div class="modal hidden" id="modal"><div><button style="float:right" id="close">닫기</button><h2>개별 응답 상세</h2><div id="detail"></div></div></div>
<script>
const CONFIG={WEB_APP_URL:'https://script.google.com/macros/s/AKfycbzZtvKWpvgsVLGyT4UnriOCZjO_aA-ygDeV4flstV8WM4qLllswoAQnSpeNnIOIpVGy/exec',ADMIN_CODE:'UVI-2026-k7Q9-mP4x',stimuli:{face_real:{label:'얼굴 1',domain:'face',isAI:false,condition:'기준'},face_ai_high:{label:'얼굴 2',domain:'face',isAI:true,condition:'AI 고품질'},face_ai_low:{label:'얼굴 3',domain:'face',isAI:true,condition:'AI 저품질'},animal_real:{label:'이미지 1',domain:'animal',isAI:false,condition:'기준'},animal_ai:{label:'이미지 2',domain:'animal',isAI:true,condition:'AI'},ui_C_baseline:{label:'UI-C',domain:'ui',isAI:false,condition:'기준'},ui_A_ai_high:{label:'UI-A',domain:'ui',isAI:true,condition:'AI 고사양'},ui_B_ai_low:{label:'UI-B',domain:'ui',isAI:true,condition:'AI 저사양'},video_real:{label:'영상 1',domain:'video',isAI:false,condition:'기준'},video_ai:{label:'영상 2',domain:'video',isAI:true,condition:'AI'}}};
const DN={face:'얼굴',animal:'동물',ui:'UI',video:'영상'}, KEYS=Object.keys(CONFIG.stimuli);let raw=[],charts={},qualityIds=new Set();const $=s=>document.querySelector(s),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// Chart.js 플러그인: 막대/점의 값을 색뿐 아니라 숫자로 직접 표시합니다.
const valueLabels={id:'valueLabels',afterDatasetsDraw(chart){const c=chart.ctx;c.save();c.font='11px sans-serif';c.fillStyle='#222';c.textAlign='center';chart.data.datasets.forEach((ds,di)=>{const meta=chart.getDatasetMeta(di);if(!ds.hideLabels)meta.data.forEach((el,i)=>{let v=ds.data[i];if(v&&typeof v==='object')v=v.y;if(Number.isFinite(Number(v)))c.fillText(Number(v).toFixed(ds.digits??2),el.x,el.y-7)});if(ds.errorBars&&chart.scales.y)meta.data.forEach((p,i)=>{const v=Number(ds.data[i]),e=ds.errorBars[i];if(!Number.isFinite(v)||!Number.isFinite(e))return;const top=chart.scales.y.getPixelForValue(v+e),bot=chart.scales.y.getPixelForValue(v-e);c.beginPath();c.moveTo(p.x,top);c.lineTo(p.x,bot);c.moveTo(p.x-5,top);c.lineTo(p.x+5,top);c.moveTo(p.x-5,bot);c.lineTo(p.x+5,bot);c.strokeStyle='#111';c.stroke()})});c.restore()}};Chart.register(valueLabels);
function val(r,k){return r[k]??r['ratings.'+k]??''}function num(x){x=Number(x);return Number.isFinite(x)?x:NaN}function mean(a){a=a.filter(Number.isFinite);return a.length?a.reduce((x,y)=>x+y,0)/a.length:NaN}function median(a){a=a.filter(Number.isFinite).sort((x,y)=>x-y);return a.length?(a.length%2?a[(a.length-1)/2]:(a[a.length/2-1]+a[a.length/2])/2):NaN}function variance(a){const m=mean(a);return a.length>1?a.reduce((s,x)=>s+(x-m)**2,0)/(a.length-1):NaN}function sd(a){return Math.sqrt(variance(a))}function ci(a){return 1.96*sd(a)/Math.sqrt(a.length)}function fmt(x,d=2){return Number.isFinite(x)?x.toFixed(d):'—'}
// UVI = R2/R3 역채점 20%씩 + 불편/섬뜩 R4/R5 30%씩.
function uvi(r,k){const q=[2,3,4,5].map(i=>num(val(r,k+'_R'+i)));return q.every(Number.isFinite)?.2*(6-q[0])+.2*(6-q[1])+.3*q[2]+.3*q[3]:NaN}function stimVals(rows,k){return rows.map(r=>uvi(r,k)).filter(Number.isFinite)}function domainUvi(r,d,ai){return mean(KEYS.filter(k=>CONFIG.stimuli[k].domain===d&&CONFIG.stimuli[k].isAI===ai).map(k=>uvi(r,k)))}
function detection(r,k){const s=CONFIG.stimuli[k],label=s.label;if(s.domain==='face')return String(r['finish.face.faceDetection']||'').split('|').includes(label);if(s.domain==='animal')return r['finish.animal.animalDetection']===label;if(s.domain==='video')return r['finish.video.videoNatural']===(label==='영상 2'?'영상 1':'영상 2')?false:NaN;return NaN}
function accuracy(r,d){if(d==='face'){const picked=String(r['finish.face.faceDetection']||'').split('|').sort().join('|');return picked===KEYS.filter(k=>CONFIG.stimuli[k].domain===d&&CONFIG.stimuli[k].isAI).map(k=>CONFIG.stimuli[k].label).sort().join('|')}if(d==='animal')return r['finish.animal.animalDetection']==='이미지 2';return NaN}
function filtered(){const ids=new Set($('#excludeIds').value.split(',').map(x=>x.trim()).filter(Boolean));return raw.filter(r=>!ids.has(String(r.responseId))&&(!$('#excludeFast').checked||!qualityIds.has(String(r.responseId))))}
async function load(){if(!CONFIG.WEB_APP_URL.startsWith('http')){$('#status').textContent='웹 앱 URL을 설정하세요.';return}$('#status').textContent='불러오는 중…';try{const j=await (await fetch(CONFIG.WEB_APP_URL+'?action=responses&_='+Date.now())).json();if(!j.ok)throw Error(j.error);raw=j.rows||[];const med=median(raw.map(r=>num(r.durationSeconds)).filter(Number.isFinite));qualityIds=new Set(raw.filter(r=>num(r.durationSeconds)<med/3).map(r=>String(r.responseId)));render();$('#status').textContent=`${new Date().toLocaleTimeString()} 갱신 · 전체 ${raw.length}건`}catch(e){$('#status').textContent='조회 실패: '+e.message}}
function render(){const rows=filtered();cards(rows);questionCharts(rows);graphs(rows);tables(rows)}
function cards(rows){const today=new Date().toISOString().slice(0,10),dur=mean(rows.map(r=>num(r.durationSeconds)));$('#cards').innerHTML=[['총 응답 수',rows.length],['오늘 응답 수',rows.filter(r=>String(r.submittedAt).slice(0,10)===today).length],['평균 소요 시간',fmt(dur/60,1)+'분'],['품질 플래그',rows.filter(r=>qualityIds.has(String(r.responseId))).length]].map(x=>`<div class="card"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('')}
function questionCharts(rows){let section=$('#questionResults');if(!section){section=document.createElement('section');section.id='questionResults';section.className='panel';section.innerHTML='<h2>문항별 응답 결과</h2><p class="muted">각 막대는 해당 답을 선택한 응답자 수와 비율을 보여줍니다. 서술형 G3는 아래 서술형 응답 목록에서 확인할 수 있습니다.</p><div class="grid" id="questionGrid"></div>';$('#cards').after(section)}Object.keys(charts).filter(k=>k.startsWith('question_')).forEach(k=>{charts[k].destroy();delete charts[k]});const questions=[{title:'배경 1. 학년',values:r=>r['background.grade'],labels:['1학년','2학년','3학년']},{title:'배경 2. 지금 사용 중인 기기',values:r=>r['background.deviceReported'],labels:['스마트폰','태블릿','PC']},{title:'배경 3. AI 도구 사용 빈도',values:r=>r['background.aiFrequency'],labels:['1','2','3','4','5']},{title:'배경 4. 불쾌한 골짜기 사전 인지',values:r=>r['background.priorKnowledge'],labels:['1','2','3','4','5']}];const ratingText=['사실적으로 보인다','요소들의 사실적인 정도가 잘 맞는다','전체적으로 자연스럽다','어색하고 불편하다','섬뜩하거나 기괴하다'];KEYS.forEach(k=>ratingText.forEach((text,i)=>questions.push({title:`${CONFIG.stimuli[k].label} R${i+1}. ${text}`,values:r=>val(r,k+'_R'+(i+1)),labels:['1','2','3','4','5']})));questions.push({title:'얼굴 마무리. AI라고 생각한 얼굴(복수 선택)',values:r=>String(r['finish.face.faceDetection']||'').split('|').filter(Boolean),labels:['얼굴 1','얼굴 2','얼굴 3','없다고 생각한다']},{title:'동물 마무리. AI라고 생각한 이미지',values:r=>r['finish.animal.animalDetection'],labels:['이미지 1','이미지 2','모르겠다']},{title:'UI 마무리 1. 가장 사용해 보고 싶은 UI',values:r=>r['finish.ui.uiUse'],labels:['UI-A','UI-B','UI-C']},{title:'UI 마무리 2. 가장 신뢰가 가는 UI',values:r=>r['finish.ui.uiTrust'],labels:['UI-A','UI-B','UI-C']},{title:'영상 마무리. 더 자연스러운 영상',values:r=>r['finish.video.videoNatural'],labels:['영상 1','영상 2','비슷하다']},{title:'G1. 가장 큰 이질감을 느낀 종류',values:r=>r['global.G1'],labels:['사람 얼굴','동물 이미지','앱 화면','영상']},{title:'G2. 가장 큰 이유',values:r=>r['global.G2'],labels:['실제와 미묘하게 달라서','요소들이 서로 안 어울려서','움직임·표정이 부자연스러워서','AI가 만든 것 같아서','기타']},{title:'확인 문항. 같은 내용을 담고 있다는 점이 분명했다',values:r=>r['global.contentCheck'],labels:['1','2','3','4','5']});const grid=$('#questionGrid');grid.innerHTML=questions.map((q,i)=>`<section class="panel" style="margin:0"><h3 style="font-size:16px;min-height:48px">${esc(q.title)}</h3><div style="height:280px;position:relative"><canvas id="questionCanvas_${i}"></canvas></div></section>`).join('');questions.forEach((q,i)=>drawQuestionChart(rows,q,i))}
function drawQuestionChart(rows,q,i){const counts=Object.fromEntries(q.labels.map(x=>[String(x),0]));rows.forEach(r=>{const got=q.values(r),values=Array.isArray(got)?got:[got];values.filter(x=>x!==undefined&&x!==null&&x!=='').forEach(x=>{x=String(x);if(!(x in counts))counts[x]=0;counts[x]++})});const choices=Object.keys(counts),total=rows.length,data=choices.map(x=>counts[x]),labels=choices.map((x,j)=>`${x} — ${data[j]}명 (${total?fmt(data[j]/total*100,1):'0.0'}%)`);charts['question_'+i]=new Chart($('#questionCanvas_'+i),{type:'bar',data:{labels,datasets:[{label:'응답자 수',data,backgroundColor:'#673ab7',digits:0}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}명 (${total?fmt(c.raw/total*100,1):'0.0'}%)`}}},scales:{x:{beginAtZero:true,ticks:{precision:0},title:{display:true,text:`응답자 수 (전체 ${total}명)`}}}}})}
function chart(id,type,data,options={}){if(charts[id])charts[id].destroy();charts[id]=new Chart($('#'+id),{type,data,options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:type==='doughnut'?{}:{y:{beginAtZero:true}},...options}})}
function graphs(rows){const conds=KEYS.map(k=>DN[CONFIG.stimuli[k].domain]+' '+CONFIG.stimuli[k].condition),avs=KEYS.map(k=>mean(stimVals(rows,k))),cis=KEYS.map(k=>ci(stimVals(rows,k)));chart('h1','bar',{labels:conds,datasets:[{label:'평균 UVI',data:avs,errorBars:cis,backgroundColor:'#8064a2'}]});const ds=['face','animal','video','ui'],deltas=ds.map(d=>mean(rows.map(r=>domainUvi(r,d,true)-domainUvi(r,d,false)).filter(Number.isFinite)));chart('delta','bar',{labels:ds.map(d=>DN[d]),datasets:[{label:'AI−기준 ΔUVI',data:deltas,backgroundColor:'#4f81bd'}]});chart('paired','line',{labels:ds.map(d=>DN[d]),datasets:rows.slice(0,120).map((r,i)=>({label:String(r.responseId).slice(-5),data:ds.map(d=>domainUvi(r,d,true)-domainUvi(r,d,false)),borderColor:`hsla(${i*47%360},55%,45%,.25)`,pointRadius:2,hideLabels:true}))});const aiKeys=KEYS.filter(k=>CONFIG.stimuli[k].isAI&&['face','animal'].includes(CONFIG.stimuli[k].domain));let yes=[],no=[];aiKeys.forEach(k=>rows.forEach(r=>{const v=uvi(r,k);if(Number.isFinite(v))(detection(r,k)?yes:no).push(v)}));chart('detect','bar',{labels:['AI 탐지','탐지 못함'],datasets:[{label:'AI 자극 평균 UVI',data:[mean(yes),mean(no)],backgroundColor:['#c0504d','#9bbb59']}]});const pts=rows.map(r=>({x:num(r['background.aiFrequency']),y:mean(KEYS.filter(k=>CONFIG.stimuli[k].isAI).map(k=>uvi(r,k)))})).filter(p=>Number.isFinite(p.x)&&Number.isFinite(p.y)),lr=linear(pts);chart('exposure','scatter',{datasets:[{label:'응답자',data:pts,backgroundColor:'#4f81bd',hideLabels:true},{label:`추세선 (기울기 ${fmt(lr.b,3)})`,data:[{x:1,y:lr.a+lr.b},{x:5,y:lr.a+5*lr.b}],type:'line',borderColor:'#c0504d',pointRadius:0,hideLabels:true}]},{scales:{x:{min:.5,max:5.5,ticks:{stepSize:1},title:{display:true,text:'AI 사용 빈도'}},y:{title:{display:true,text:'AI UVI'}}}});const uil=['UI-A','UI-B','UI-C'],use=uil.map(l=>pct(rows,r=>r['finish.ui.uiUse']===l)),trust=uil.map(l=>pct(rows,r=>r['finish.ui.uiTrust']===l));chart('uiChoice','bar',{labels:uil,datasets:[{label:'사용 의향 %',data:use,backgroundColor:'#4f81bd'},{label:'신뢰 %',data:trust,backgroundColor:'#c0504d'}]},{scales:{x:{stacked:true},y:{stacked:true,max:200}}});const uik=uil.map(l=>KEYS.find(k=>CONFIG.stimuli[k].label===l));chart('uiUvi','bar',{labels:uil,datasets:[{label:'평균 UVI',data:uik.map(k=>mean(stimVals(rows,k))),backgroundColor:'#8064a2'},{label:'평균 선택률(비율)',data:uil.map((_,i)=>(use[i]+trust[i])/200),backgroundColor:'#9bbb59'}]});chart('accuracy','bar',{labels:['얼굴','동물'],datasets:[{label:'완전 정답률 %',data:['face','animal'].map(d=>pct(rows,r=>accuracy(r,d)===true)),backgroundColor:'#4f81bd'}]},{scales:{y:{min:0,max:100}}});distChart('g1',rows,'global.G1');distChart('g2',rows,'global.G2')}
function pct(rows,fn){return rows.length?100*rows.filter(fn).length/rows.length:0}function linear(p){const mx=mean(p.map(x=>x.x)),my=mean(p.map(x=>x.y)),b=p.reduce((s,x)=>s+(x.x-mx)*(x.y-my),0)/p.reduce((s,x)=>s+(x.x-mx)**2,0);return{a:my-b*mx,b}}
function distChart(id,rows,key){const m={};rows.forEach(r=>{const x=r[key]||'무응답';m[x]=(m[x]||0)+1});chart(id,'doughnut',{labels:Object.keys(m),datasets:[{label:'명',data:Object.values(m),backgroundColor:['#4f81bd','#c0504d','#9bbb59','#8064a2','#f2a65a']}]})}
function tables(rows){$('#heat').innerHTML='<table class="heat"><tr><th>자극</th>'+[1,2,3,4,5].map(i=>`<th>R${i}</th>`).join('')+'</tr>'+KEYS.map(k=>`<tr><th>${CONFIG.stimuli[k].label}<br><small>${k}</small></th>`+[1,2,3,4,5].map(i=>{const v=mean(rows.map(r=>num(val(r,k+'_R'+i))).filter(Number.isFinite)),a=Number.isFinite(v)?Math.max(0,Math.min(1,(v-1)/4)):0;return `<td style="background:rgba(103,58,183,${a*.65})">${fmt(v)}</td>`}).join('')+'</tr>').join('')+'</table>';$('#desc').innerHTML=statTable(rows);$('#tests').innerHTML=testTable(rows);$('#texts').innerHTML='<table><tr><th>ID</th><th>서술 응답</th></tr>'+rows.map(r=>`<tr><td>${esc(r.responseId)}</td><td style="text-align:left">${esc(r['global.G3'])}</td></tr>`).join('')+'</table>';$('#rows').innerHTML='<table class="responses"><tr><th>ID</th><th>제출 시각</th><th>순서</th><th>소요(초)</th><th>플래그</th></tr>'+rows.map((r,i)=>`<tr data-i="${i}"><td>${esc(r.responseId)}</td><td>${esc(r.submittedAt)}</td><td>${esc(r.orderCode)}</td><td>${esc(r.durationSeconds)}</td><td>${qualityIds.has(String(r.responseId))?'초고속':''}</td></tr>`).join('')+'</table>';[...document.querySelectorAll('.responses tr[data-i]')].forEach(tr=>tr.onclick=()=>detail(rows[+tr.dataset.i]))}
function statTable(rows){return '<table><tr><th>조건</th><th>N</th><th>평균</th><th>SD</th><th>중앙값</th><th>95% CI</th></tr>'+KEYS.map(k=>{const a=stimVals(rows,k);return `<tr><td>${DN[CONFIG.stimuli[k].domain]} ${CONFIG.stimuli[k].condition}</td><td>${a.length}</td><td>${fmt(mean(a))}</td><td>${fmt(sd(a))}</td><td>${fmt(median(a))}</td><td>±${fmt(ci(a))}</td></tr>`}).join('')+'</table>'}
// Cronbach α = k/(k−1) × (1−문항분산합/총점분산). R2·R3은 역채점합니다.
function alpha(rows,k){const items=rows.map(r=>[6-num(val(r,k+'_R2')),6-num(val(r,k+'_R3')),num(val(r,k+'_R4')),num(val(r,k+'_R5'))]).filter(a=>a.every(Number.isFinite));if(items.length<2)return NaN;const sumVar=[0,1,2,3].reduce((s,j)=>s+variance(items.map(a=>a[j])),0),total=items.map(a=>a.reduce((x,y)=>x+y));return 4/3*(1-sumVar/variance(total))}
// 대응 t: 차이 평균/(차이 SD/√n), Cohen d_z: 차이 평균/차이 SD.
function paired(rows,d){const x=rows.map(r=>domainUvi(r,d,true)-domainUvi(r,d,false)).filter(Number.isFinite),t=mean(x)/(sd(x)/Math.sqrt(x.length));return{x,t,p:2*(1-normalCdf(Math.abs(t))),dz:mean(x)/sd(x)}}
// Wilcoxon signed-rank: 0 차이를 빼고 절대차 순위를 매겨 양의 순위합 W+와 정규근사 p를 계산합니다(동순위 평균).
function wilcoxon(x){let a=x.filter(v=>v!==0).map(v=>({v,abs:Math.abs(v)})).sort((x,y)=>x.abs-y.abs);for(let i=0;i<a.length;){let j=i;while(j+1<a.length&&a[j+1].abs===a[i].abs)j++;const rank=(i+j+2)/2;for(let z=i;z<=j;z++)a[z].rank=rank;i=j+1}const W=a.filter(x=>x.v>0).reduce((s,x)=>s+x.rank,0),n=a.length,z=(W-n*(n+1)/4)/Math.sqrt(n*(n+1)*(2*n+1)/24);return{W,p:2*(1-normalCdf(Math.abs(z)))}}
// Friedman χ² = 12/[n k(k+1)] ΣRj² − 3n(k+1); p는 χ² 생존함수 근사.
function friedman(rows){const ds=['face','animal','video','ui'],complete=rows.map(r=>ds.map(d=>domainUvi(r,d,true)-domainUvi(r,d,false))).filter(a=>a.every(Number.isFinite)),R=[0,0,0,0];complete.forEach(a=>rank(a).forEach((v,i)=>R[i]+=v));const n=complete.length,k=4,q=12/(n*k*(k+1))*R.reduce((s,x)=>s+x*x,0)-3*n*(k+1);return{q,p:chiSquareSf(q,3),n}}
function rank(a){const z=a.map((v,i)=>({v,i})).sort((x,y)=>x.v-y.v),r=[];for(let i=0;i<z.length;){let j=i;while(j+1<z.length&&z[j+1].v===z[i].v)j++;for(let q=i;q<=j;q++)r[z[q].i]=(i+j+2)/2;i=j+1}return r}function normalCdf(x){return .5*(1+erf(x/Math.sqrt(2)))}function erf(x){const s=x<0?-1:1;x=Math.abs(x);const t=1/(1+.3275911*x);return s*(1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-.284496736)*t+.254829592)*t*Math.exp(-x*x))}function chiSquareSf(x,k){if(k===3){const z=Math.sqrt(2*x)-Math.sqrt(2*k-1);return 1-normalCdf(z)}return 1-normalCdf((Math.pow(x/k,1/3)-(1-2/(9*k)))/Math.sqrt(2/(9*k)))}
function testTable(rows){const al=KEYS.map(k=>`<tr><td>Cronbach α</td><td>${CONFIG.stimuli[k].label}</td><td colspan="6">${fmt(alpha(rows,k),3)}</td></tr>`).join('');const tests=['face','animal','video','ui'].map(d=>{const t=paired(rows,d),w=wilcoxon(t.x);return{d,t,w}});const sorted=[...tests].sort((a,b)=>a.t.p-b.t.p);let prev=0;sorted.forEach((x,i)=>{prev=Math.max(prev,Math.min(1,x.t.p*(sorted.length-i)));x.holm=prev});const fr=friedman(rows);return '<table><tr><th>분석</th><th>유형</th><th>N</th><th>t / χ²</th><th>p</th><th>Holm p</th><th>W</th><th>Cohen d</th></tr>'+al+tests.map(x=>`<tr><td>AI vs 기준 대응비교</td><td>${DN[x.d]}</td><td>${x.t.x.length}</td><td>${fmt(x.t.t,3)}</td><td>${fmt(x.t.p,4)}</td><td>${fmt(x.holm,4)}</td><td>${fmt(x.w.W,1)} (p=${fmt(x.w.p,4)})</td><td>${fmt(x.t.dz,3)}</td></tr>`).join('')+`<tr><td>Friedman</td><td>도메인 ΔUVI</td><td>${fr.n}</td><td>χ²=${fmt(fr.q,3)}</td><td>${fmt(fr.p,4)}</td><td colspan="3">df=3</td></tr></table><p class="muted">p값은 브라우저 내 정규/카이제곱 근사입니다. 최종 논문 분석은 통계 패키지로 재검증하세요. Holm 값은 4개 도메인 대응 t검정에 적용했습니다.</p>`}
function detail(r){$('#detail').innerHTML='<table>'+Object.entries(r).map(([k,v])=>`<tr><th>${esc(k)}</th><td style="text-align:left">${esc(v)}</td></tr>`).join('')+'</table>';$('#modal').classList.remove('hidden')}
function csv(){if(!raw.length)return;const h=[...new Set(raw.flatMap(Object.keys))],q=v=>'"'+String(v??'').replace(/"/g,'""')+'"',text='\ufeff'+[h.map(q).join(','),...raw.map(r=>h.map(k=>q(r[k])).join(','))].join('\r\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/csv;charset=utf-8'}));a.download='survey_raw_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href)}
$('#loginBtn').onclick=()=>{if($('#code').value!==CONFIG.ADMIN_CODE){$('#loginError').textContent='접속 코드가 올바르지 않습니다.';return}sessionStorage.setItem('uviAdmin','1');$('#login').classList.add('hidden');$('#dash').classList.remove('hidden');load()};$('#refresh').onclick=load;$('#csv').onclick=csv;$('#excludeFast').onchange=render;$('#excludeIds').oninput=render;$('#close').onclick=()=>$('#modal').classList.add('hidden');$('#modal').onclick=e=>{if(e.target===$('#modal'))$('#modal').classList.add('hidden')};if(sessionStorage.getItem('uviAdmin')==='1'){$('#login').classList.add('hidden');$('#dash').classList.remove('hidden');load()}setInterval(()=>{if(!$('#dash').classList.contains('hidden'))load()},60000);
